modId="wnl_packfixes"
version="1.57.0"
displayTest="IGNORE_ALL_VERSION"
displayName="WNL Pack Fixes (Custom Coremod)"
authors="DegradingAnt"
description='''
Runtime bytecode fixes for this pack, applied at class-load time so original mod jars stay untouched:
- Fix 64 (1.53.0): alltheleaks 1.1.9 (confirmed latest, no newer build) AthenaResourceLoaderMixin fails to apply because it @Shadows athena's setGetter as an INSTANCE method but athena 4.0.6 made setGetter + the `getter` field static -> "STATIC modifier of @Shadow method setGetter does not match the target" InvalidMixinException (fail-soft: athena's resource-loader leak-fix silently lost, no crash). Matches the mixin to athena 4.0.6: makes the @Shadow setGetter static (drop ABSTRACT, add STATIC, stub RETURN body Mixin discards) and rewrites clearGetter's verified `aload_0; aconst_null; invokevirtual setGetter` call site to static (drop the receiver, invokevirtual->invokestatic; Mixin rebinds the owner to athena's static setGetter). Restores the leak-fix. Self-no-ops with a log line if alltheleaks/athena change. Offline transform-applies tested (COMPUTE_FRAMES re-serialize OK).
- Fix 63 (1.54.0, refines the 1.52.0 synchronized version): sable VoxelNeighborhoodState$1/$2 thread-unsafe solidity cache crash under c2me / c2me-OpenCL parallel worldgen. The static singletons IS_SOLID_MEMOIZED / IS_FULL_BLOCK memoize "is this block solid"/"is full block" in a `private final Int2BooleanOpenHashMap cache`, keyed PURELY on blockState.hashCode() (result is a pure function of the state). The map is NOT thread-safe; parallel-gen block-changes (SableCommonEvents.handleBlockChange -> getState -> isSolid/isFullBlock) hit computeIfAbsent -> insert -> rehash() concurrently, corrupt the map, and rehash() throws ArrayIndexOutOfBoundsException (Index -1 out of bounds for length 65) -> "Exception ticking world" crash. Only surfaces when c2me/OCL parallelise gen (DH was LOD'ing at 18 chunks/s when it hit); single-thread gen never races it. The 1.52.0 fix added ACC_SYNCHRONIZED to apply(), but the cache is a process-wide SINGLETON, so that monitor is global -> every solidity query across all gen threads serialized -> OCL parallel gen collapsed 18 -> 4 chunks/s. This version instead converts the `cache` field from a shared Int2BooleanOpenHashMap to a ThreadLocal of per-thread maps (3 retargets per $N: field type; <init> `new ThreadLocal()`; apply() lazily fetches/creates this thread's map after `getfield cache`). Because the value is a pure function of blockState.hashCode(), per-thread caches give byte-identical results -- only cross-thread reuse is lost (a re-derived solidity hits vanilla's own BlockState shape cache anyway). NO shared mutable state -> no rehash race, no lock, no contention -> the crash is fixed AND OCL's parallelism is restored. c2me's gen pool is fixed-size so the per-thread map count is bounded (no leak). Offline transform-applies tested on both $N (COMPUTE_FRAMES re-serialize OK). Self-no-ops with a log line if sable renames apply/cache.
- Fix 62 (1.51.0): jearchaeology x dungeon_difficulty player-JOIN deadlock. jearchaeology's onDataSync (fires on player join) rolls every brushing recipe's loot table; those tables carry dungeon_difficulty's LocalScalingLootFunction, whose PatternMatching$LocationData.matches runs a BLOCKING StructureManager.startsForStructure -> Level.getChunk(FULL) on the Server thread. At login the spawn chunk isn't FULL yet and c2me can't service it while the main thread is parked -> permanent hang in PlayerList.placeNewPlayer (all c2me workers idle), world never loads. Gates the structure lookup on a NON-blocking ServerLevel.hasChunkAt(this.position): if the chunk isn't loaded the zone reads as no-structure-match (flag already false) instead of blocking. Real gameplay (mob drops/chests) always has the chunk loaded -> structure scaling unchanged; only the join-time enumeration (no real location to scale to) skips it. Same blocking-getChunk-under-c2me class as Fix 60 + the byepregen FasterGetChunk deadlock. Offline-tested (COMPUTE_FRAMES re-serialize OK).
- Fix 61 (1.50.0): GENERAL duplicate-enum-name crash guard. A mis-packaged multi-loader mod (e.g. hybrid_birds 1.2, which adds its MobCategory spawn-groups via BOTH the native NeoForge META-INF/enumextensions.json AND a Forge-style $VALUES-append SpawnGroupMixin — the toml loads forge.mixins.json on NeoForge) double-registers an enum constant with the same getSerializedName -> StringRepresentable.createNameLookup's Collectors.toMap throws "Duplicate key hybrid_birds:terrestrial_bird" during net.minecraft.server.Bootstrap -> whole pack crashes before the window opens (GL Caps: ERR). De-dupes createNameLookup's input array by serialized name (keep-first) at method head via an injected wnl$dedupeByName helper, so a duplicate is skipped instead of crashing. General root fix for the recurring duplicate-enum incompat class (offline-tested: COMPUTE_FRAMES re-serialize OK).
- Fix 60 (1.49.0): slabbed re-entrant chunk-load DEADLOCK at spawn (slabbed 0.4.2-beta.1+26.2, updated 2026-06-28). slabbed's getShape mixin -> SlabAnchorAttachment.isAnchored did a BLOCKING Level.getChunk(II); during wnllux StarLight threaded lighting on a c2me worker this re-enters the chunk system, starves the c2me worker pool, and the spawn-chunk future never completes -> Server thread parks forever at player login (getOverworldRespawnPos), world never loads (145s->300s+ watchdog). Redirects all 11 blocking Level.getChunk(II) in SlabAnchorAttachment to a non-blocking helper (ServerChunkCache.getChunkNow on the server -> null if not loaded -> reads as not-anchored, self-corrects; original Level.getChunk on the client). Same class as Fix 26 (DO×Farsight) + the colonyborder re-entrant guard.
- Fix 59 (1.48.0): minecolonies research-load resilience. minecolonies 1.1.1341 shipped two combat research files (thathitthemark, slicedanddecided) with a cost type "minecolonies:item_simple" that the mod no longer registers, so the cost codec threw and the WHOLE datapack reload aborted -> "data packs prevented the world from loading" Safe Mode screen. Wraps ResearchListener.parseResearchCosts in try/catch(Throwable) -> empty cost list on failure, so a single bad research becomes cost-free instead of bricking every world; all other research loads. (WNL-Compat datapack also data-fixes the specific 1341 files.)
- Quark 4.1-480: tiny potato null-model guard (crash with Continuity + broken resource pack model)
- Spawn 4.0.4: Field Guide compat reflection guard (MalformedParameterizedTypeException)
- MRPGC Skill Tree 1.1.2: remap to Skill Tree (RPG Series) 1.4.4 renamed classes
- Spawn 4.0.4: variant-manager randoms made chunkgen-thread-safe (broken chunks/popups)
- NeoForge: creative-tab insertAfter/Before missing-anchor fallback (append instead of throw)
- fieldguide 1.11.2: world-join biome-search memoization (multi-second join stall removed)
- softimprints: duplicate first-person capture render gated to the snapshot interval
- respackopts 4.11.3 / libjf 3.17.4: ResourcePath.getName() null-PackType guard (stops the NPE that corrupts dynamictrees' RegisterEvent when Paxi datapacks are scanned)
- libjf_unsafe 3.17.4: InterfaceImplTargetPatch hierarchy scan reads .class bytes instead of loading classes during transform (removes the 3-way class-load deadlock that froze the creative inventory 100% and intermittently stalled world load)
- createaeronauticscurios 2.0 (aeronautics_curios_compat): strips the injector handlers from its 3 LinkedTypewriter mixins. The 2.0 mixins were built for a newer Create Aeronautics than the bundled one (aeronautics 1.3.0), so their MixinExtras @Local/@At do not resolve against simulated 1.3.0 -> Critical injection failure -> mod-construction abort -> wakes "Cannot get config value before config is loaded" tick-1 crash. @Shadow fields + interface kept (no ClassCast); goggles-curio core untouched; only the already-broken remote-typewriter behaviour is disabled.
- fuelgoeshere 1.2.0: strips the forceFuel injector from MixinBlockIronFurnaceContainerBase. It targets the original Iron Furnaces, but this pack uses the "Iron Furnace Reburn" fork whose class differs -> injection finds 0 targets -> same construction-abort/wakes cascade. Its vanilla-furnace mixin (MixinAbstractFurnaceMenu) is untouched; only the iron-furnace auto-fuel hook (broken vs the fork) is disabled.
- domum_ornamentum 1.0.233 x Farsight x Flywheel: MateriallyTexturedBlockEntity.requestModelDataUpdate gets an isRemoved()-guard early-return. Stops a render-thread livelock (frozen game) when a Farsight chunk-swap removes a DO block: clearAllBlockEntities -> setRemoved -> requestModelDataUpdate -> setBlocksDirty -> Flywheel checkUpdate re-creates the DO block-entity mid-iteration and re-adds it to the map being iterated -> infinite loop. Guard only fires on the teardown path (remove==true); live-block rendering is 100% unchanged.
- caverns_and_chasms 3.0.0 (SERVER): CCCreativeTabs' two creative-tab generators read a CLIENT config (CCConfig.CLIENT.creativeTab/.copperCreativeTab) which is never loaded on a dedicated server. When Sawmill forces a creative-tab rebuild during PlayerList.placeNewPlayer, the read throws "Cannot get config value before config is loaded" -> "Couldn't place player in world" -> the first player to join after a restart is kicked with "Invalid player data" and their accessories get wiped. Each tab generator is wrapped in try/catch(Throwable)->return so the throw can't abort player placement (tab contents are irrelevant on a server; guard never fires client-side where the config IS loaded).
- mca 7.7.11 x custom-model armor (Epic Paladins [GeckoLib] + Epic Knights [magistuarmory]): MCA's enableVillagerPlayerModel renders the player with a genetic villager model + a PoseStack scale and force-overrides the armor model, which clobbers 3D armor (misaligned/broken). The genetic path is gated on the plain method MCAClient.useGeneticsRenderer(UUID)Z; it is HEAD-guarded to return false when the player wears, in any of HEAD/CHEST/LEGS/FEET, either a GeckoLib GeoItem armor (Epic Paladins etc.) OR a magistuarmory MedievalArmorItem (Epic Knights, incl. DyeableMedievalArmorItem + addon ArmorTypes). Effect: a player wearing such armor renders the vanilla model + vanilla armor handling (so the armor fits the skeleton it was authored for); unarmored / vanilla-armored players keep the MCA genetic model. Client-only; self-no-ops with a log line if MCA renames the method.
- hole_filler_mod: HfmConfig.GetServerData() wrapped in try/catch(Throwable) returning a fresh new ServerConfigData(). At the main menu HfmConfig.Server is null (set only on integrated-server start), so JEI's background search indexer calling the HFM items' appendHoverText made GetServerData() NPE -> "Caught an error getting an Ingredient's tooltip" x10 per boot. The fresh default's no-arg ctor builds the full nested graph so downstream derefs don't re-NPE; in-world the real config is used unchanged.
- wakes 1.3.6: intermittent tick-1 crash. WakeClientTicker.onClientTick touches WakeHandler whose <clinit> reads WakesConfig.APPEARANCE.wakeResolution.get() at class-init; on a config-load race (tick 1 before the mod config loads) that throws "Cannot get config value before config is loaded" -> ExceptionInInitializerError -> crash. Both static event handlers (onClientTick + onLevelUnload) are wrapped in try/catch(Throwable)->return, so on the rare race wakes' water ripples self-disable for that session instead of crashing; non-race sessions are 100% unaffected.
- dungeoncrawl 2.3.17: DungeonModelBlock$PropertyHolder.apply(BlockState) is wrapped in try/catch(Throwable) returning the input state unchanged. It did state.setValue(this.property, this.value) guarded by hasProperty() but NOT by a null-check on the value; for some placed blocks (seen: mossy_cobblestone_stairs) the resolved value is null, so setValue(waterlogged, null) threw IllegalArgumentException -> "Feature placement" ReportedException -> the chunk failed its "features" stage -> "Failed to load chunk" during worldgen. Now a null/invalid property is skipped (the dungeon block keeps its default state, e.g. a stair stays non-waterlogged) and the chunk generates. Server-relevant (worldgen).
- structurize 1.0.831 x domum_ornamentum x minecolonies: ItemStackUtils.getItemStacksOfTileEntity is wrapped in try/catch(Throwable) returning Collections.emptyList(). MineColonies builders compute a building's required items by deserializing each saved block-entity; if a colony/blueprint block carries a DO materially_retexturable block-entity on a non-DO block (seen: white_concrete/cobblestone -- style-pack/version data mismatch), BlockEntity.validateBlockState throws "Invalid block entity ... got Block{...}", which propagated up the CitizenAI state machine and left the builder STUCK. Now the malformed TE yields no items and the builder keeps building (the bad block places as its plain block). Server-side.
- SynchedEntityData.assignValue (vanilla): skips a type-mismatched entity-data field instead of throwing. Under client<->server mod drift (a mod updated on the client but not the server registers a synched field with a different type), the server's entity-sync packet would otherwise abort with "Invalid entity data item type" -> the client disconnects with "Network Protocol Error". The guard makes the bad field no-op (stays client-default) so valid fields still apply and the player stays connected.
- minecolonies 1.1.1332 (Fix 53, THE dedicated-server boot-crash root): ItemFood (base of every minecolonies food item) has an un-dist-guarded client reference -- getTooltipImage() calls Minecraft.getInstance().level (a ClientLevel). ItemFood first loads when ModItemsInitializer constructs ItemMilkyBread; verifying it on a dedicated server forces ClientLevel to load -> "invalid dist DEDICATED_SERVER" -> minecolonies item-registration aborts -> the item registry never finalises -> every item DeferredHolder stays unbound -> knightlib/simulated/spawn/aeronautics/paladins all cascade "unbound value"/null-item (the Fix 51/52 victims). getTooltipImage is rewritten to return Optional.empty() (removes the only Minecraft/ClientLevel ref in the class), so ItemFood loads server-side, items register, and the cascade clears. Costs a minor client tooltip-preview image; nothing functional.
- minecolonies 1.1.1332 x MineColonies_Tweaks 3.30 / MineColonies_Compatibility 3.51 (Fix 54, the dedicated-server boot-LOOP root): today's minecolonies snapshot refactored its internals, so ~20 of these two addons' mixin injectors (@Redirect/@WrapOperation/@Modify*) no longer resolve -- e.g. FoodUtilsMixin.hasBestOptionInInv2 is a @Redirect on @At(ordinal=2) of ItemStorage.getItem() but the rewritten method now has only 2 such calls (ordinals 0,1). Each injector is required=1 by default, so the first to apply throws a Critical InjectionError; the server reaches "Done" then crashes on the first tick (CompatibilityManager.discoverFood -> FoodUtils) and the host restarts it in a loop. FIX: every minecolonies-targeting mixin in both addons (109 classes, enumerated from their mixin configs) gets require=0 + expect=0 set on all its injector annotations. require is a floor, never a ceiling -- a still-resolving injector applies exactly as before; only a genuinely-unresolvable one no-ops (graceful degradation) instead of aborting. Self-heals when the addons ship 1.1.1332-matched builds. Accessors/Invokers verified intact offline (no require-less break mode left). The degraded behaviours until then are addon "tweaks" (food-tier representation, study/lumberjack AI, guard Tinkers-damage compat, recipe secondary outputs) -- colonies run on base minecolonies behaviour.
- additionalstructures 6.3.2 (Fix 55): Events.onClientTick reads Config.UPDATE_CHECKER.get() (its update-checker phone-home) every client tick, guarded only by a field-null check, NOT a config-loaded check. At the main menu -- before AS's client config loads -- .get() throws "Cannot get config value before config is loaded" and the game crashes on the first client tick; became deterministic once ~10 added mods delayed config load past tick 1. (smsn "Save My Shit Network" mixins the same Events CLASS but only its SupporterCheck/SupporterRewards/onPlayerLogin methods -- NOT onClientTick -- so the smsn tag in the trace is a red herring.) onClientTick is HEAD-no-op'd (RETURN inserted at entry): the whole method is the update checker (a network feature the pack already neuters via smsn), so no game content is lost. Self-no-ops with a log line if AS renames/removes onClientTick.
- createaeronauticscurios 2.1 / aeronautics_curios_compat (Fix 56): ClientKeyInputHandler.onClientTick calls ModKeyBindings.REMOTE_USE.consumeClick() every client tick, but REMOTE_USE is null — the mod's keybinding/feature init is skipped because its 2.x build targets a newer Create Aeronautics than the bundled aeronautics 1.3.0 (same version-mismatch family as the LinkedTypewriter injector strips). -> NullPointerException on the first client tick -> hard crash (surfaced once the RFL×immersive_armors crash ahead of it was cleared). HEAD-guard inserted: if REMOTE_USE is null, return — skips the whole handler (the remote-use + remote-typewriter feature is already non-functional under the mismatch). Self-heals (runs normally) if a matched Create Aeronautics ever registers the keybinding.
- forgified-fabric-api GLOBAL entity-attribute timing fix (Fix 57, paired with WNL-FFAPIAttrFix-1.0.0.jar): FFAPI's FabricDefaultAttributeRegistry.register(EntityType, AttributeSupplier) eagerly puts into vanilla DefaultAttributes DURING a mod's RegisterEvent, forcing DefaultAttributes.<clinit> before later registries bind (e.g. atmospheric's camel_variant entity_data_serializer) -> "Trying to access unbound value" NPE -> ExceptionInInitializerError poisons the vanilla class -> whole-load cascade (lne_wizards -> takesapillage/magistuarmory unbound -> animatica config-not-loaded at render). Fix 57 rewrites register(EntityType,AttributeSupplier)'s body to call wnl_ffapiattr's FfapiAttrDefer.enqueue() then RETURN (in place of the eager put); the addon replays the queue at EntityAttributeCreationEvent (correct NeoForge timing, after ALL registration), so DefaultAttributes initialises once, late, fully bound. The Builder overload funnels through this method, so this single redirect fixes EVERY FFAPI-attribute mod (the LNE series + future) at the core. Requires WNL-FFAPIAttrFix to be present (it provides enqueue()).
- Galosphere 1.5.5 (Fix 58, the 40s load-in freeze): ForgottenRuinsMapLootModifier.doApply called MapItem.renderBiomePreviewMap — a synchronous large-radius biome scan on the SERVER THREAD — whenever a Forgotten Ruins treasure map was rolled in loot, so world load-in (during Ksyxis prepareLevels) and any later map drop stalled the server tick 40s+ (verified thread dump: Server thread in renderBiomePreviewMap <- ForgottenRuinsMapLootModifier.doApply). The renderBiomePreviewMap call is skipped (INVOKESTATIC replaced with POP,POP): the map still drops, keeps its target decoration + name, and fills its biome colours in as the player explores (like a vanilla explorer map) instead of pre-rendering them all in one huge synchronous scan. Self-no-ops with a log line if Galosphere renames the method.
Each fix logs "[uvfixes] ..." and safely no-ops if a mod update changes the target.
'''
