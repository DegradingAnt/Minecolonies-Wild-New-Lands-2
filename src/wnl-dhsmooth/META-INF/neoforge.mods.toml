[[mods]]
modId = "wnl_dhsmooth"
version = "1.3.0"
displayName = "WNL DH LOD Smoothing"
authors = "DegradingAnt"
description = '''A client-side fix for the periodic frame-spike freezes Distant Horizons can cause. DH uploads its LOD render buffers in the background, and when a batch finishes, the very next frame has to draw all that new geometry at once. On a GPU already busy pushing DH through shaders, that single frame lands as a multi-hundred-millisecond hitch. This caps how many newly-finished buffers get added to the draw list each frame (in RenderBufferHandler.buildRenderList), so a batch fades in over a few frames instead of all at once. Terrain that's already on screen is never held back, and deferred buffers are retried every following frame, so distant LODs just appear a frame or two later, which you won't notice at that range. Same final image, no graphics settings changed. v1.2.0 adds an adaptive worker-thread governor: DH's LOD and world-gen worker threads compete with Sodium and world generation for CPU, and under load that starves the render thread and drops FPS; the governor scales DH's worker run-time ratio to your live frame-rate (full speed when there's headroom, throttled when frames dip) so chunk generation stops lagging the client — LOD quality and range unchanged. v1.3.0 adds a second governor input: the integrated server's tick health (MSPT), so DH also backs off when its world-gen workers stretch the server tick, not just when they drop frames — the governor throttles by whichever (frames or ticks) is more stressed. Configure or disable either feature in config/wnl_dhsmooth.properties. Client-only, and it quietly does nothing if DH's internals move. Delete the jar to remove it. Add-on to WNL PackFixes.'''

[[mixins]]
config = "wnl_dhsmooth.mixins.json"

