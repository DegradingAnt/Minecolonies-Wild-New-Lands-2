# WNL DH LOD draw-batch smoothing
enabled=true
# Base number of brand-new distant-LOD buffers drawn per frame.
# Higher = new terrain fills in faster but bigger draw spikes. 8-32 sensible.
newBuffersPerFrame=16
# Adaptive cap: when exploring (big backlog) the rate rises up to this.
maxBuffersPerFrame=32
# How long (in frames) a shown LOD is remembered so it returns INSTANTLY
# (turning around / re-entering a view). ~200 = a couple seconds.
rememberFrames=200
adaptive=true
governor=false
